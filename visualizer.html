<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GUARD — Distributed Rate Limiter Visualizer</title>
<style>
  :root {
    --bg: #0f1117;
    --panel: #1a1d27;
    --border: #2a2d3a;
    --accent: #4f8ef7;
    --green: #3ecf8e;
    --red: #f56565;
    --yellow: #f6ad55;
    --text: #e2e8f0;
    --muted: #718096;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 13px;
    overflow: hidden;
  }

  body { display: flex; flex-direction: column; }

  header {
    flex-shrink: 0;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  header h1 { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: 2px; }
  header span { color: var(--muted); font-size: 11px; }

  .phase-tabs {
    flex-shrink: 0;
    display: flex;
    gap: 4px;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
  }
  .phase-tab {
    padding: 5px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: none;
    color: var(--muted);
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    transition: all 0.15s;
  }
  .phase-tab:hover { border-color: var(--accent); color: var(--text); }
  .phase-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .main {
    flex: 1;
    min-height: 0;
    display: flex;
  }

  .canvas-wrap {
    flex: 1;
    min-width: 0;
    position: relative;
    border-right: 1px solid var(--border);
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  .phase-desc {
    position: absolute;
    bottom: 12px;
    left: 12px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    max-width: 420px;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
    pointer-events: none;
  }
  .phase-desc strong { color: var(--text); }

  /* Sidebar */
  .sidebar {
    width: 300px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .section {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .section h3 {
    color: var(--muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .control-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .control-row label { color: var(--text); font-size: 12px; }
  input[type=range] { width: 110px; accent-color: var(--accent); }
  .val-badge { min-width: 36px; text-align: right; color: var(--accent); font-size: 12px; }

  .btn-row { display: flex; gap: 8px; margin-top: 10px; }
  button.primary {
    flex: 1; padding: 8px; background: var(--accent);
    border: none; border-radius: 6px; color: #fff;
    font-family: inherit; font-size: 12px; cursor: pointer;
  }
  button.primary:hover { opacity: 0.85; }
  button.primary.stop { background: var(--red); }
  button.secondary {
    padding: 8px 12px; background: none;
    border: 1px solid var(--border); border-radius: 6px;
    color: var(--muted); font-family: inherit; font-size: 12px; cursor: pointer;
  }
  button.secondary:hover { border-color: var(--accent); color: var(--text); }

  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .stat-card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px;
  }
  .stat-card .lbl { color: var(--muted); font-size: 10px; text-transform: uppercase; margin-bottom: 2px; }
  .stat-card .val { font-size: 20px; font-weight: 700; }
  .stat-card.c-blue .val  { color: var(--accent); }
  .stat-card.c-green .val { color: var(--green); }
  .stat-card.c-red .val   { color: var(--red); }
  .stat-card.c-yellow .val{ color: var(--yellow); }

  .user-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .user-name { width: 40px; font-size: 11px; }
  .bar-bg { flex: 1; height: 12px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.25s, background 0.25s; }
  .token-num { width: 24px; text-align: right; font-size: 11px; color: var(--muted); }

  .worker-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 6px; padding: 7px 10px;
  }
  .w-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
  .w-lbl { flex: 1; font-size: 12px; }
  .w-stats { font-size: 11px; }
  .w-ok { color: var(--green); margin-right: 4px; }
  .w-rl { color: var(--red); }

  .log-list { max-height: 150px; overflow-y: auto; font-size: 11px; line-height: 1.7; }
  .log-entry { border-bottom: 1px solid #1e2030; }
  .log-entry .ts { color: var(--muted); margin-right: 5px; }
  .log-ok  { color: var(--green); }
  .log-rl  { color: var(--red); }
</style>
</head>
<body>

<header>
  <h1>GUARD</h1>
  <span>Global User API Rate Defender &mdash; Distributed Systems Visualizer</span>
</header>

<div class="phase-tabs">
  <button class="phase-tab" data-phase="1">Phase 1: Single Server</button>
  <button class="phase-tab" data-phase="2">Phase 2: Local Rate Limit</button>
  <button class="phase-tab" data-phase="3">Phase 3: Load Balancer</button>
  <button class="phase-tab active" data-phase="4">Phase 4: Coordinator</button>
</div>

<div class="main">
  <div class="canvas-wrap">
    <canvas id="cv"></canvas>
    <div class="phase-desc" id="phase-desc"></div>
  </div>

  <div class="sidebar">
    <div class="section">
      <h3>Simulation Controls</h3>
      <div class="control-row">
        <label style="color:#4f8ef7">alice req/s</label>
        <input type="range" id="rate-alice" min="0" max="15" value="4">
        <span class="val-badge" id="rate-alice-val">4/s</span>
      </div>
      <div class="control-row">
        <label style="color:#9f7aea">bob req/s</label>
        <input type="range" id="rate-bob" min="0" max="15" value="4">
        <span class="val-badge" id="rate-bob-val">4/s</span>
      </div>
      <div class="control-row">
        <label style="color:#f6ad55">carol req/s</label>
        <input type="range" id="rate-carol" min="0" max="15" value="4">
        <span class="val-badge" id="rate-carol-val">4/s</span>
      </div>
      <div class="control-row">
        <label>Bucket capacity</label>
        <input type="range" id="bucket-cap" min="2" max="20" value="10">
        <span class="val-badge" id="bucket-cap-val">10</span>
      </div>
      <div class="control-row">
        <label>Refill rate</label>
        <input type="range" id="refill-rate" min="1" max="10" value="3">
        <span class="val-badge" id="refill-rate-val">3/s</span>
      </div>
      <div class="btn-row">
        <button class="primary" id="start-btn">&#9654; Start</button>
        <button class="secondary" id="reset-btn">Reset</button>
      </div>
    </div>

    <div class="section">
      <h3>Overall Statistics</h3>
      <div class="stat-grid">
        <div class="stat-card c-blue">
          <div class="lbl">Total Sent</div>
          <div class="val" id="stat-total">0</div>
        </div>
        <div class="stat-card c-green">
          <div class="lbl">Accepted</div>
          <div class="val" id="stat-ok">0</div>
        </div>
        <div class="stat-card c-red">
          <div class="lbl">Rate Limited</div>
          <div class="val" id="stat-rl">0</div>
        </div>
        <div class="stat-card c-yellow">
          <div class="lbl">RL Rate</div>
          <div class="val" id="stat-pct">0%</div>
        </div>
      </div>
    </div>

    <div class="section" id="bucket-section">
      <h3>Token Buckets</h3>
    </div>

    <div class="section" id="worker-section">
      <h3>Workers</h3>
    </div>

    <div class="section" style="flex:1">
      <h3>Request Log</h3>
      <div class="log-list" id="log-list"></div>
    </div>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const USERS  = ['alice', 'bob', 'carol'];
const COLORS = { alice: '#4f8ef7', bob: '#9f7aea', carol: '#f6ad55' };
const PORTS  = [9101, 9102, 9103];

const PHASE_DESC = {
  1: '<strong>Phase 1 — Single Server:</strong> One guard_server handles all requests directly with no rate limiting. Simple but not scalable.',
  2: '<strong>Phase 2 — Local Rate Limiting:</strong> The server maintains a per-user token bucket locally. Rate limits are enforced per-server — users routed to different servers could bypass them.',
  3: '<strong>Phase 3 — Load Balancer:</strong> guard_lb distributes requests round-robin. Rate limits are still local per worker, so a user can consume up to 3× their quota across workers.',
  4: '<strong>Phase 4 — Central Coordinator:</strong> guard_coord holds the single source of truth for token buckets. Every worker checks with the coordinator before processing — true system-wide rate limiting.',
};

// For each phase: list of hops a packet makes
const HOPS = {
  1: ['c→s', 's→c'],
  2: ['c→s', 's→c'],
  3: ['c→lb', 'lb→w', 'w→lb', 'lb→c'],
  4: ['c→lb', 'lb→w', 'w→coord', 'coord→w', 'w→lb', 'lb→c'],
};

// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  phase: 4,
  running: false,
  userRates: { alice: 4, bob: 4, carol: 4 },
  spawnAccs: { alice: 0, bob: 0, carol: 0 },
  bucketCap: 10,
  refillRate: 3,
  users: {},       // { name: { tokens } }
  workers: [],     // [{ ok, rl }]
  packets: [],
  total: 0, ok: 0, rl: 0,
  pid: 0,
  raf: null,
  lastTs: null,
};

// ── Layout ────────────────────────────────────────────────────────────────────
// Returns node positions for a given canvas size
function layout(phase, cw, ch) {
  const cx = ch / 2;
  const nodes = {};

  nodes.client = { x: cw * 0.08, y: cx, label: 'guard_client', sub: ['multi-thread', 'load gen'], color: '#4f8ef7' };

  if (phase <= 2) {
    nodes.server = { x: cw * 0.60, y: cx, label: 'guard_server', sub: [':8080', 'worker'], color: '#9f7aea' };
  }

  if (phase === 3) {
    nodes.lb = { x: cw * 0.38, y: cx, label: 'guard_lb', sub: [':9100', 'round-robin'], color: '#f6ad55' };
    const spread = 2 * 90;
    nodes.workers = [0,1,2].map((i) => ({
      x: cw * 0.68, y: cx - spread/2 + i*90,
      label: 'guard_server', sub: [`:${PORTS[i]}`, 'worker'], color: '#9f7aea',
    }));
  }

  if (phase === 4) {
    nodes.lb = { x: cw * 0.33, y: cx, label: 'guard_lb', sub: [':9100', 'round-robin'], color: '#f6ad55' };
    const spread = 2 * 90;
    nodes.workers = [0,1,2].map((i) => ({
      x: cw * 0.58, y: cx - spread/2 + i*90,
      label: 'guard_server', sub: [`:${PORTS[i]}`, 'worker'], color: '#9f7aea',
    }));
    nodes.coord = { x: cw * 0.86, y: cx, label: 'guard_coord', sub: [':9200', 'token buckets'], color: '#3ecf8e' };
  }

  return nodes;
}

// Returns {from, to} for a given hop name and worker index
function hopEndpoints(hop, nodes, wi) {
  const w = nodes.workers ? nodes.workers[wi] : nodes.server;
  const map = {
    'c→s':    [nodes.client, nodes.server],
    's→c':    [nodes.server, nodes.client],
    'c→lb':   [nodes.client, nodes.lb],
    'lb→c':   [nodes.lb,    nodes.client],
    'lb→w':   [nodes.lb,    w],
    'w→lb':   [w,           nodes.lb],
    'w→coord':[w,           nodes.coord],
    'coord→w':[nodes.coord, w],
  };
  return map[hop] || [nodes.client, w];
}

// ── Canvas drawing ────────────────────────────────────────────────────────────
const cv  = document.getElementById('cv');
const ctx = cv.getContext('2d');

function resize() {
  const rect = cv.parentElement.getBoundingClientRect();
  cv.width  = rect.width  * devicePixelRatio;
  cv.height = rect.height * devicePixelRatio;
  cv.style.width  = rect.width  + 'px';
  cv.style.height = rect.height + 'px';
}

function drawRoundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function drawArrow(x1, y1, x2, y2, dashed) {
  const dx = x2 - x1, dy = y2 - y1;
  const len = Math.sqrt(dx*dx + dy*dy);
  if (len < 1) return;
  const ux = dx/len, uy = dy/len;
  const pad = 58;
  const sx = x1 + ux*pad, sy = y1 + uy*pad;
  const ex = x2 - ux*pad, ey = y2 - uy*pad;

  ctx.save();
  ctx.strokeStyle = '#3a3d4a';
  ctx.lineWidth = 1.5;
  if (dashed) ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(sx, sy);
  ctx.lineTo(ex, ey);
  ctx.stroke();
  ctx.setLineDash([]);

  // arrowhead
  const aw = 7;
  ctx.fillStyle = '#3a3d4a';
  ctx.beginPath();
  ctx.moveTo(ex, ey);
  ctx.lineTo(ex - ux*aw + uy*aw*0.5, ey - uy*aw - ux*aw*0.5);
  ctx.lineTo(ex - ux*aw - uy*aw*0.5, ey - uy*aw + ux*aw*0.5);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawNode(node) {
  const NW = 110, NH = 60;
  const x = node.x - NW/2;
  const y = node.y - NH/2;

  ctx.save();
  drawRoundRect(x, y, NW, NH, 10);
  ctx.fillStyle = '#1a1d27';
  ctx.fill();
  ctx.strokeStyle = node.color;
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.fillStyle = node.color;
  ctx.font = `bold 12px 'SF Mono', monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(node.label, node.x, node.y - 8);

  ctx.fillStyle = '#718096';
  ctx.font = `10px 'SF Mono', monospace`;
  node.sub.forEach((line, i) => {
    ctx.fillText(line, node.x, node.y + 7 + i * 13);
  });
  ctx.restore();
}

function drawFrame() {
  const dpr = devicePixelRatio;
  ctx.clearRect(0, 0, cv.width, cv.height);

  // Scale once so all drawing functions use logical (CSS) coordinates
  ctx.save();
  ctx.scale(dpr, dpr);

  const cw = cv.width / dpr;
  const ch = cv.height / dpr;
  const nodes = layout(S.phase, cw, ch);

  // Draw edges
  if (S.phase <= 2) {
    drawArrow(nodes.client.x, nodes.client.y, nodes.server.x, nodes.server.y, false);
  }
  if (S.phase >= 3 && nodes.lb) {
    drawArrow(nodes.client.x, nodes.client.y, nodes.lb.x, nodes.lb.y, false);
    for (const w of nodes.workers) {
      drawArrow(nodes.lb.x, nodes.lb.y, w.x, w.y, false);
    }
  }
  if (S.phase === 4 && nodes.coord) {
    for (const w of nodes.workers) {
      drawArrow(w.x, w.y, nodes.coord.x, nodes.coord.y, true);
    }
    // edge label "rate_check"
    const midW = nodes.workers[1];
    const mx = (midW.x + nodes.coord.x) / 2;
    const my = (midW.y + nodes.coord.y) / 2 - 10;
    ctx.save();
    ctx.fillStyle = '#4a5568';
    ctx.font = `9px 'SF Mono', monospace`;
    ctx.textAlign = 'center';
    ctx.fillText('rate_check', mx, my);
    ctx.restore();
  }

  // Draw nodes
  if (S.phase <= 2) {
    drawNode(nodes.client);
    drawNode(nodes.server);
  } else {
    drawNode(nodes.client);
    drawNode(nodes.lb);
    for (const w of nodes.workers) drawNode(w);
    if (nodes.coord) drawNode(nodes.coord);
  }

  // Draw packets
  for (const p of S.packets) {
    const [from, to] = hopEndpoints(p.hops[p.hop], nodes, p.wi);
    if (!from || !to) continue;
    const x = from.x + (to.x - from.x) * p.t;
    const y = from.y + (to.y - from.y) * p.t;

    let color = COLORS[p.userId] || '#4f8ef7';
    if (p.status === 'ok') color = '#3ecf8e';
    if (p.status === 'rl') color = '#f56565';

    ctx.save();
    ctx.shadowColor = color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(x, y, 6, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.restore();

    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.font = `9px 'SF Mono', monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(p.userId.slice(0, 3), x, y - 10);
    ctx.restore();
  }

  ctx.restore(); // remove dpr scale
}

// ── Simulation ────────────────────────────────────────────────────────────────
function initState() {
  S.users   = {};
  S.workers = [];
  const numW = S.phase < 3 ? 1 : 3;
  for (const u of USERS) S.users[u] = { tokens: S.bucketCap };
  for (let i = 0; i < numW; i++) S.workers.push({ ok: 0, rl: 0 });
}

function spawnPacket(userId) {
  const numW = S.phase < 3 ? 1 : 3;
  const wi = Math.floor(Math.random() * numW);
  S.pid++;
  S.packets.push({
    id: S.pid,
    userId,
    wi,
    hops: HOPS[S.phase],
    hop: 0,
    t: 0,
    speed: 0.018 + Math.random() * 0.008,
    status: 'pending',
  });
}

function stepPackets(dt) {
  const done = [];
  for (const p of S.packets) {
    p.t += p.speed * (dt / 16);
    if (p.t >= 1) {
      p.t = 0;
      p.hop++;

      // Determine outcome
      if (S.phase === 4 && p.hop === 3) {
        // coord response received
        const u = S.users[p.userId];
        if (u && u.tokens >= 1) { p.status = 'ok'; u.tokens -= 1; }
        else p.status = 'rl';
      } else if (S.phase === 2 && p.hop === 1) {
        const u = S.users[p.userId];
        if (u && u.tokens >= 1) { p.status = 'ok'; u.tokens -= 1; }
        else p.status = 'rl';
      } else if (S.phase === 3 && p.hop === 2) {
        const u = S.users[p.userId];
        if (u && u.tokens >= 0.5) { p.status = 'ok'; u.tokens -= 0.5; }
        else p.status = 'rl';
      } else if (S.phase === 1 && p.hop === 1) {
        p.status = 'ok';
      }

      if (p.hop >= p.hops.length) {
        done.push(p);
      }
    }
  }
  for (const p of done) {
    S.packets = S.packets.filter(x => x.id !== p.id);
    const accepted = p.status === 'ok';
    S.total++; accepted ? S.ok++ : S.rl++;
    if (S.workers[p.wi]) accepted ? S.workers[p.wi].ok++ : S.workers[p.wi].rl++;
    addLog(p.userId, accepted);
    updateStats();
  }
}

function refillTokens(dt) {
  for (const u of Object.values(S.users)) {
    u.tokens = Math.min(S.bucketCap, u.tokens + S.refillRate * dt / 1000);
  }
}

// ── Main loop ─────────────────────────────────────────────────────────────────
function loop(ts) {
  if (!S.running) return;
  const dt = S.lastTs === null ? 0 : Math.min(ts - S.lastTs, 100);
  S.lastTs = ts;

  refillTokens(dt);
  stepPackets(dt);

  for (const u of USERS) {
    if (!S.userRates[u]) continue;
    S.spawnAccs[u] += dt;
    const interval = 1000 / S.userRates[u];
    while (S.spawnAccs[u] >= interval) {
      S.spawnAccs[u] -= interval;
      spawnPacket(u);
    }
  }

  drawFrame();
  updateBuckets();
  updateWorkers();

  S.raf = requestAnimationFrame(loop);
}

function start() {
  if (S.running) return;
  S.running  = true;
  S.lastTs   = null;
  S.spawnAccs = { alice: 0, bob: 0, carol: 0 };
  document.getElementById('start-btn').innerHTML = '&#9646; Stop';
  document.getElementById('start-btn').classList.add('stop');
  S.raf = requestAnimationFrame(loop);
}

function stop() {
  S.running = false;
  if (S.raf) { cancelAnimationFrame(S.raf); S.raf = null; }
  document.getElementById('start-btn').innerHTML = '&#9654; Start';
  document.getElementById('start-btn').classList.remove('stop');
}

function reset() {
  stop();
  S.packets = [];
  S.total = 0; S.ok = 0; S.rl = 0;
  initState();
  updateStats();
  updateBuckets();
  updateWorkers();
  document.getElementById('log-list').innerHTML = '';
  drawFrame();
}

// ── Sidebar updates ───────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('stat-total').textContent = S.total;
  document.getElementById('stat-ok').textContent    = S.ok;
  document.getElementById('stat-rl').textContent    = S.rl;
  const pct = S.total > 0 ? Math.round(S.rl / S.total * 100) : 0;
  document.getElementById('stat-pct').textContent   = pct + '%';
}

function updateBuckets() {
  const sec = document.getElementById('bucket-section');
  // Keep h3, replace rest
  const h3  = sec.querySelector('h3');
  // Build new rows
  const rows = USERS.map(u => {
    const user = S.users[u] || { tokens: 0 };
    const pct  = Math.min(100, user.tokens / S.bucketCap * 100);
    const bg   = pct > 50 ? '#3ecf8e' : pct > 20 ? '#f6ad55' : '#f56565';
    return `<div class="user-row">
      <span class="user-name" style="color:${COLORS[u]}">${u}</span>
      <div class="bar-bg"><div class="bar-fill" style="width:${pct.toFixed(1)}%;background:${bg}"></div></div>
      <span class="token-num">${Math.floor(user.tokens)}</span>
    </div>`;
  }).join('');
  sec.innerHTML = '';
  sec.appendChild(h3);
  sec.insertAdjacentHTML('beforeend', rows);
}

function updateWorkers() {
  const sec = document.getElementById('worker-section');
  const h3  = sec.querySelector('h3');
  const numW = S.phase < 3 ? 1 : 3;
  const rows = Array.from({ length: numW }, (_, i) => {
    const w    = S.workers[i] || { ok: 0, rl: 0 };
    const port = S.phase < 3 ? 8080 : PORTS[i];
    return `<div class="worker-row">
      <div class="w-dot"></div>
      <span class="w-lbl">:${port}</span>
      <span class="w-stats">
        <span class="w-ok">&#10003;${w.ok}</span>
        <span class="w-rl">&#10007;${w.rl}</span>
      </span>
    </div>`;
  }).join('');
  sec.innerHTML = '';
  sec.appendChild(h3);
  sec.insertAdjacentHTML('beforeend', rows);
}

function addLog(userId, ok) {
  const list = document.getElementById('log-list');
  const ts   = new Date().toLocaleTimeString('en-US', { hour12: false });
  const div  = document.createElement('div');
  div.className = 'log-entry';
  div.innerHTML = `<span class="ts">${ts}</span>`
    + `<span class="${ok ? 'log-ok' : 'log-rl'}">[${userId}] ${ok ? '✓ ok' : '✗ rate_limited'}</span>`;
  list.prepend(div);
  while (list.children.length > 50) list.removeChild(list.lastChild);
}

// ── Control wiring ─────────────────────────────────────────────────────────────
for (const u of USERS) {
  document.getElementById(`rate-${u}`).addEventListener('input', e => {
    S.userRates[u] = +e.target.value;
    document.getElementById(`rate-${u}-val`).textContent = S.userRates[u] + '/s';
  });
}
document.getElementById('bucket-cap').addEventListener('input', e => {
  S.bucketCap = +e.target.value;
  document.getElementById('bucket-cap-val').textContent = S.bucketCap;
  for (const u of Object.values(S.users)) u.tokens = Math.min(u.tokens, S.bucketCap);
});
document.getElementById('refill-rate').addEventListener('input', e => {
  S.refillRate = +e.target.value;
  document.getElementById('refill-rate-val').textContent = S.refillRate + '/s';
});
document.getElementById('start-btn').addEventListener('click', () => {
  S.running ? stop() : start();
});
document.getElementById('reset-btn').addEventListener('click', reset);

document.querySelectorAll('.phase-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.phase-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    S.phase = +tab.dataset.phase;
    document.getElementById('phase-desc').innerHTML = PHASE_DESC[S.phase];
    reset();
  });
});

window.addEventListener('resize', () => { resize(); drawFrame(); });

// ── Boot ──────────────────────────────────────────────────────────────────────
resize();
initState();
updateStats();
updateBuckets();
updateWorkers();
document.getElementById('phase-desc').innerHTML = PHASE_DESC[S.phase];
drawFrame();
</script>
</body>
</html>
